<!DOCTYPE html>
<html>
<head>

    <title>Sixteen Creative Agency</title>

   
    <style>
        
        * {
            margin: 0;
            
    }
        .MainContainer {
            background-color: #9abd67;
                
    }
        
        header {
            background-color: #acd373;
            display: inline-block;
            width: 95%;
            height: 10vh;
                
    }
        
        .logo {
            height: 7vh;
            
    }
             
         #Sixteenlogo {
             position: relative;
             left: 3vw;
             top: 2vh;
             
    }       
               
       
        
        nav {
            background-color: #89a85c;
            display: inline-block;
            position: absolute;
            top: right;
             
    }
        
        .mobileNav {
            height: 10vh;
            width: 10vh;
            
                
    }
        
        .content {
            height: 90vh;
     
    }
        
        h1{
            color: #f5f5f5;
            text-align: center; 
            font-weight: bold;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 5vmin; 
    }
        
        h2 {
            color: #f5f5f5;
            text-align: center; 
            font-style:italic;
            font-family: 'Droid Serif', serif;
            font-size: 3.5vmin;
    }
        
        .dnArrow {
             position: absolute;
             top: 60%;
             left: 50%;
             transform: translate(-50%, -50%);
        
    }
        
        
        .navBox {
            height: 4vh;
            width: 4vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
    }
        
   
        
       .BGimage {
           width: 100%;        
        
    }
        
        .info {
            position:absolute; top:50%; left: 50%;
            transform: translate(-50%, -50%);
            
    }

    </style>
    <link href="https://fonts.googleapis.com/css?family=Droid+Serif" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro" rel="stylesheet">
</head>
<body>
    
  
    <div class= "MainContainer">
    
        <header>
            <div id= "Sixteenlogo">
                <img src="SixteenDesignImages/1logo.png" class="logo" alt="Sixteen Creative Agency Logo "/>
            </div>      
        </header>
        <nav>
            <div class="mobileNav">
                <img src="SixteenDesignImages/2icon.png" class="navBox" alt="Mobile Navigation"/>
            </div>
        </nav>
    
         
        <div class="content">
            <div class="info">
                <h1>We Are Sixteen Creative Agency</h1>
                <br/>  
                <h2>Based on Jakarta, Indonesia</h2>
            </div>       
            <div class= "dnArrow">
                <img src="SixteenDesignImages/3arrow.png" class="arrow" alt="Down arrow"/>
            </div>
        </div>
     
        <footer>
            <img src="SixteenDesignImages/4siluetBG.png" class="BGimage" alt="City background image"/>
          
        </footer>
    </div>
    
</body>

</html>
